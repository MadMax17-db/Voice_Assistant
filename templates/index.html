<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lakshya 2047 — Mission Control Voice Assistant with rotating neural constellation." />
  <title>Lakshya 2047 — Mission Control</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
</head>
<body>

  <div class="app">

    <!-- ===== Left Panel: Canvas + Controls ===== -->
    <div class="left-panel">

      <div class="panel-header">
        <div class="panel-title">Mission Control</div>
      </div>

      <!-- Canvas for rotating network constellation -->
      <div class="canvas-area">
        <canvas id="network-canvas"></canvas>
      </div>

      <!-- Status -->
      <div class="status-section">
        <div class="status-label" id="status">S T A N D B Y</div>
      </div>

      <!-- Input Bar -->
      <div class="input-section">
        <div id="speech-banner" class="speech-banner"></div>
        <div class="input-bar">
          <input
            type="text"
            id="text-input"
            class="input-field"
            placeholder="Ask a question…"
            autocomplete="off"
          />
          <button class="ctrl-btn mic-btn" id="mic-btn" aria-label="Toggle microphone" title="Press Space to speak">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <button class="ctrl-btn send-btn" id="send-btn" aria-label="Send" title="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

    </div>

    <!-- ===== Right Panel: Live Transcript ===== -->
    <div class="right-panel">

      <div class="transcript-header">
        <div class="transcript-title">Live Transcript</div>
      </div>

      <div class="chat-log" id="chat-log"></div>

      <div class="footer-hint">
        <kbd>Space</kbd> speak · <kbd>Enter</kbd> send · Chrome recommended
      </div>

    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
